version: 2

project_name: bpx

before:
  hooks:
    - go mod tidy

builds:
  - id: bpx
    main: ./cmd/bpx
    binary: bpx
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

nfpms:
  - id: deb
    package_name: openbpx
    file_name_template: "{{ .PackageName }}_{{ .Version }}_{{ .Arch }}"
    homepage: "https://github.com/wilddogjp/openbpx"
    maintainer: "Wild Dog, Inc."
    description: "Blueprint Toolkit CLI for Unreal Engine packages"
    license: "Apache-2.0"
    formats:
      - deb
    bindir: /usr/local/bin
    builds:
      - bpx

checksum:
  name_template: "checksums.txt"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
