name: Bug report
description: Report a reproducible problem in bpx behavior.
title: "[Bug]: "
labels:
  - bug
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I checked README.md and docs/commands.md.
          required: true
        - label: This is not a security vulnerability (those must be reported via SECURITY.md).
          required: true
  - type: input
    id: bpx_version
    attributes:
      label: BPX version or commit SHA
      description: Output of `bpx version` or the exact commit SHA.
      placeholder: "0.2.0"
    validations:
      required: true
  - type: input
    id: ue_version
    attributes:
      label: Unreal Engine file version (if known)
      description: For example `FileVersionUE5=1017`.
      placeholder: "FileVersionUE5=1017"
  - type: textarea
    id: command
    attributes:
      label: Command and arguments
      description: Paste the exact command you ran.
      placeholder: |
        bpx prop list ./Sample.uasset --export 1 --format toml
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction asset/setup (if shareable)
      description: Provide the smallest reproducible setup and steps.
      placeholder: |
        1. Prepare ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      description: Paste error output and stack traces if available.
      render: shell
  - type: textarea
    id: before_after_uasset
    attributes:
      label: Before/after `.uasset` attachments (optional but recommended)
      description: |
        If possible, attach both files:
        - the `.uasset` before running `bpx`
        - the `.uasset` after running `bpx`
        If sharing files is not possible, describe why.
