name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0)"
        required: true
        type: string

jobs:
  goreleaser:
    if: ${{ github.repository == 'wilddogjp/openbpx' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Verify requested tag exists
        run: |
          set -euo pipefail
          git fetch --force --tags
          if ! git rev-parse -q --verify "refs/tags/${{ inputs.tag }}" >/dev/null; then
            echo "error: tag not found: ${{ inputs.tag }}" >&2
            exit 1
          fi

      - name: Verify bpx version matches release tag
        run: ./scripts/check-version-tag.sh "${{ inputs.tag }}"

      - name: Verify changelog entry exists for release tag
        run: ./scripts/check-changelog-entry.sh "${{ inputs.tag }}"

      - name: Run Goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: v2.0.1
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ inputs.tag }}
