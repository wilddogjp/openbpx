name: release

on:
  push:
    tags:
      - "v*"

jobs:
  goreleaser:
    if: ${{ github.repository == 'wilddogjp/bpx' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Run Goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: v2.0.1
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
