name: test

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
      - "feature/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Download modules
        run: go mod download

      - name: gofmt
        run: test -z "$(gofmt -l .)"

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.4.7
          staticcheck ./...

      - name: unit tests
        run: go test ./... -v

      - name: short fuzz (parse)
        run: go test ./pkg/uasset -fuzz FuzzParseAsset -fuzztime 5s
